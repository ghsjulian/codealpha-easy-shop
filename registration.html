<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | Easy Shop</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <link rel="stylesheet" href="css/login-style.css" />
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1 class="logo">Easy Shop</h1>
                <p class="subtitle">Welcome back to your favorite store</p>
            </div>

            <div class="form-container">
                <form>
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input
                                type="email"
                                placeholder="you@example.com"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper password-wrapper">
                            <i class="fas fa-lock"></i>
                            <input
                                type="password"
                                id="password"
                                placeholder="••••••••"
                                required
                            />
                            <button
                                type="button"
                                class="toggle-password"
                                onclick="togglePassword()"
                            >
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="options">
                        <label class="checkbox-label">
                            <input type="checkbox" /> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn">Registration</button>
                </form>

                <div class="divider"><span>or continue with</span></div>

                <div class="social-buttons">
                    <button class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>

                <p class="signup-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>
            </div>

            <div class="footer">© 2026 Easy Shop • All Rights Reserved</div>
        </div>

        <script>
            function togglePassword() {
                const passwordField = document.getElementById("password");
                const icon = document.querySelector(".toggle-password i");
                if (passwordField.type === "password") {
                    passwordField.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    passwordField.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }
        </script>
    </body>
</html>
