<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registration | Easy Shop E-Commerce</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <link rel="stylesheet" href="css/login-style.css" />
                <script>
            window.onload = () => {
                let token = localStorage.getItem("token");
                if (token !== null) {
                   window.location.href = "/";
                }
            };
        </script>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1 class="logo">Easy Shop</h1>
                <p class="subtitle">Create your account and start shopping</p>
            </div>

            <div class="form-container">
                <form>
                    <div class="row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input
                                type="text"
                                placeholder="Alex Smith"
                        
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input
                                type="email"
                                placeholder="you@example.com"
                                
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input
                                type="tel"
                                placeholder="+880 1XXX-XXXXXX"
                                
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper password-wrapper">
                            <i class="fas fa-lock"></i>
                            <input
                                type="password"
                                id="reg-password"
                                placeholder="Create strong password"
                                
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input
                                type="password"
                                id="confirm-password"
                                placeholder="Confirm password"
                                
                            />
                        </div>
                    </div>

                    <button type="submit" class="login-btn">
                        Create Account
                    </button>
                </form>

                <div class="divider"><span>or sign up with</span></div>

                <div class="social-buttons">
                    <button class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>

                <p class="signin-link" style="margin-top: 30px">
                    Already have an account? <a href="login.html">Sign in</a>
                </p>
            </div>

            <div class="footer">© 2026 Easy Shop • All Rights Reserved</div>
        </div>
        <script src="js/signup.js"></script>
    </body>
</html>
